# nginx config cho frontend container — phục vụ Vue SPA build
# Container này ngồi sau reverse proxy nginx, không xử lý SSL
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip              on;
    gzip_vary         on;
    gzip_types        text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length   256;
    gzip_proxied      any;

    # SPA routing — tất cả path không match file → trả index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets: JS/CSS/fonts — cache 1 năm (Vite thêm content hash vào tên file)
    location ~* \.(js|css|woff2?|ttf|eot|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Images — cache 7 ngày
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Không cache index.html — luôn lấy version mới nhất
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Ẩn nginx version
    server_tokens off;
}
