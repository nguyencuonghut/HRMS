services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-hrms}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI / API
    healthcheck:
      test: ["CMD", "/mailpit", "readyz"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --loop asyncio
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-hrms}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-prod}
      DEBUG: "true"
      ENVIRONMENT: ${ENVIRONMENT:-development}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Ho_Chi_Minh}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-}
      MINIO_SECURE: "false"
      BACKUP_STORAGE_ENDPOINT: ${BACKUP_STORAGE_ENDPOINT:-minio:9000}
      BACKUP_STORAGE_ACCESS_KEY: ${BACKUP_STORAGE_ACCESS_KEY:-${MINIO_ROOT_USER:-minioadmin}}
      BACKUP_STORAGE_SECRET_KEY: ${BACKUP_STORAGE_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-minioadmin}}
      BACKUP_STORAGE_SECURE: ${BACKUP_STORAGE_SECURE:-false}
      BACKUP_STORAGE_BUCKET: ${BACKUP_STORAGE_BUCKET:-hrms-backup}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      SMTP_USE_STARTTLS: ${SMTP_USE_STARTTLS:-false}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-no-reply@hrms.local}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Hồng Hà HRMS}
      COMPANY_NAME: ${COMPANY_NAME:-Công ty Hồng Hà}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_FULL_NAME: ${BOOTSTRAP_ADMIN_FULL_NAME:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      mailpit:
        condition: service_healthy

  celery_worker:
    build: ./backend
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info -Q celery,exports,backups
    healthcheck:
      test: ["CMD-SHELL", 'python -c "from pathlib import Path; import sys; cmd=Path(\"/proc/1/cmdline\").read_bytes(); sys.exit(0 if b\"celery\" in cmd and b\"worker\" in cmd else 1)"']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-hrms}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-prod}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Ho_Chi_Minh}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-}
      MINIO_SECURE: "false"
      BACKUP_STORAGE_ENDPOINT: ${BACKUP_STORAGE_ENDPOINT:-minio:9000}
      BACKUP_STORAGE_ACCESS_KEY: ${BACKUP_STORAGE_ACCESS_KEY:-${MINIO_ROOT_USER:-minioadmin}}
      BACKUP_STORAGE_SECRET_KEY: ${BACKUP_STORAGE_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-minioadmin}}
      BACKUP_STORAGE_SECURE: ${BACKUP_STORAGE_SECURE:-false}
      BACKUP_STORAGE_BUCKET: ${BACKUP_STORAGE_BUCKET:-hrms-backup}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      SMTP_USE_STARTTLS: ${SMTP_USE_STARTTLS:-false}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-no-reply@hrms.local}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Hồng Hà HRMS}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy

  celery_beat:
    build: ./backend
    command: celery -A app.core.celery_app.celery_app beat --loglevel=info
    healthcheck:
      test: ["CMD-SHELL", 'python -c "from pathlib import Path; import sys; cmd=Path(\"/proc/1/cmdline\").read_bytes(); sys.exit(0 if b\"celery\" in cmd and b\"beat\" in cmd else 1)"']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-hrms}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-prod}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Ho_Chi_Minh}
      BACKUP_STORAGE_ENDPOINT: ${BACKUP_STORAGE_ENDPOINT:-minio:9000}
      BACKUP_STORAGE_ACCESS_KEY: ${BACKUP_STORAGE_ACCESS_KEY:-${MINIO_ROOT_USER:-minioadmin}}
      BACKUP_STORAGE_SECRET_KEY: ${BACKUP_STORAGE_SECRET_KEY:-${MINIO_ROOT_PASSWORD:-minioadmin}}
      BACKUP_STORAGE_SECURE: ${BACKUP_STORAGE_SECURE:-false}
      BACKUP_STORAGE_BUCKET: ${BACKUP_STORAGE_BUCKET:-hrms-backup}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      SMTP_USE_STARTTLS: ${SMTP_USE_STARTTLS:-false}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-no-reply@hrms.local}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Hồng Hà HRMS}
    depends_on:
      - redis
      - celery_worker
      - mailpit

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "rm -rf node_modules/.vite && npm install && npm run dev -- --host --force"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1

volumes:
  postgres_data:
  minio_data:
