name: CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  # OCI/Docker image references must be lowercase. Repo của bạn là
  # `nguyencuonghut/HRMS`, nên không thể dùng trực tiếp `${{ github.repository }}`
  # vì phần `HRMS` viết hoa sẽ làm image ref invalid.
  IMAGE_NAMESPACE: nguyencuonghut/hrms
  IMAGE_BACKEND:  hrms-backend
  IMAGE_BACKUP:   hrms-backup
  IMAGE_FRONTEND: hrms-frontend

# ── Jobs ────────────────────────────────────────────────────────────────────────

jobs:
  # ── 1. Backend tests ──────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB:       hrms_test
          POSTGRES_USER:     postgres
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 3
      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        ports: ["9000:9000"]
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval 5s
          --health-retries 5
        volumes:
          - /tmp/minio-data:/data
        command: server /data

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run database migrations
        working-directory: backend
        env:
          DATABASE_URL:    postgresql+asyncpg://postgres:testpass@localhost:5432/hrms_test
          REDIS_URL:       redis://localhost:6379/0
          SECRET_KEY:      ci-test-secret-key-not-for-production
          ENCRYPTION_KEY:  ""
          ENVIRONMENT:     development
          MINIO_ENDPOINT:  localhost:9000
          MINIO_SECURE:    "false"
        run: alembic upgrade head

      - name: Seed test baseline data
        working-directory: backend
        env:
          DATABASE_URL:    postgresql+asyncpg://postgres:testpass@localhost:5432/hrms_test
          REDIS_URL:       redis://localhost:6379/0
          SECRET_KEY:      ci-test-secret-key-not-for-production
          ENCRYPTION_KEY:  ""
          ENVIRONMENT:     development
          MINIO_ENDPOINT:  localhost:9000
          MINIO_SECURE:    "false"
        run: python -m app.seeds --sample

      - name: Run tests
        working-directory: backend
        env:
          DATABASE_URL:    postgresql+asyncpg://postgres:testpass@localhost:5432/hrms_test
          REDIS_URL:       redis://localhost:6379/0
          SECRET_KEY:      ci-test-secret-key-not-for-production
          ENCRYPTION_KEY:  ""
          ENVIRONMENT:     development
          MINIO_ENDPOINT:  localhost:9000
          MINIO_SECURE:    "false"
          DEBUG:           "false"
        run: pytest tests/ -q --tb=short --no-header

  # ── 2. Frontend type check ────────────────────────────────────────────────────
  check-frontend:
    name: Frontend Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Vue type check
        working-directory: frontend
        run: npx vue-tsc --noEmit

  # ── 3. Build & Push Docker images (master branch only) ───────────────────────
  build-and-push:
    name: Build & Push Images
    needs: [test-backend, check-frontend]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_BACKEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build and push backup image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/backup/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_BACKUP }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_BACKUP }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 4. Deploy to staging (master branch only) ────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Validate staging SSH secrets
        env:
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
        run: |
          set -e
          [ -n "$STAGING_HOST" ] || { echo "Missing required secret: STAGING_HOST"; exit 1; }
          [ -n "$STAGING_USER" ] || { echo "Missing required secret: STAGING_USER"; exit 1; }
          [ -n "$STAGING_SSH_KEY" ] || { echo "Missing required secret: STAGING_SSH_KEY"; exit 1; }

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key:      ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/hrms-staging
            export BACKEND_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_BACKEND }}
            export BACKUP_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_BACKUP }}
            export FRONTEND_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_FRONTEND }}
            export IMAGE_TAG=${{ github.sha }}
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u "${{ github.actor }}" --password-stdin
            # Pull đúng artifact vừa build/push
            docker compose -f docker-compose.prod.yml pull backend celery_worker celery_beat backup_scheduler frontend
            # Restart đủ services dùng image mới
            docker compose -f docker-compose.prod.yml up -d --no-deps --remove-orphans backend celery_worker celery_beat backup_scheduler frontend
            # Run migrations
            docker compose -f docker-compose.prod.yml exec -T backend alembic upgrade head
            echo "Staging deploy complete at $(date)"
