# ── Rate limiting zones (khai báo ở http context) ───────────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m   rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

# Docker embedded DNS. Dùng proxy_pass qua biến để nginx re-resolve service
# name sau khi container backend/frontend bị recreate và đổi IP.
resolver 127.0.0.11 valid=30s ipv6=off;

server {
    listen 80;
    server_name hrms.honghafeed.com.vn 172.16.2.100 _;

    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/x-font-ttf font/opentype image/svg+xml;

    client_max_body_size 10m;

    proxy_connect_timeout  10s;
    proxy_read_timeout     120s;
    proxy_send_timeout     60s;

    set $frontend_upstream http://frontend:80;
    set $backend_upstream  http://backend:8000;

    location / {
        proxy_pass         $frontend_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /api/v1/auth/login {
        limit_req        zone=login_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         $backend_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req        zone=api_limit burst=40 nodelay;
        limit_req_status 429;

        proxy_pass         $backend_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        proxy_no_cache     1;
        proxy_cache_bypass 1;
    }

    location ~* ^/api/v1/(employees/import|imports/) {
        client_max_body_size 20m;

        proxy_pass         $backend_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass       $backend_upstream;
        proxy_set_header Host $host;
        access_log off;
    }
}
