# ── Rate limiting zones (khai báo ở http context) ───────────────────────────
# API chung: 30 req/giây/IP — burst 40
limit_req_zone $binary_remote_addr zone=api_limit:10m   rate=30r/s;
# Login endpoint: 5 req/phút/IP — chặn brute force
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

# Docker embedded DNS. Dùng proxy_pass qua biến để nginx re-resolve service
# name sau khi container backend/frontend bị recreate và đổi IP.
resolver 127.0.0.11 valid=30s ipv6=off;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ─────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name _;                  # Thay bằng domain thực: hrms.hongha.vn

    # SSL certificate (Let's Encrypt hoặc tự ký)
    # Đặt cert tại: ./nginx/ssl/fullchain.pem và ./nginx/ssl/privkey.pem
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Chỉ TLS 1.2+ — không dùng TLS 1.0/1.1
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ──────────────────────────────────────────────────────
    # (Supplement các header FastAPI middleware đã gửi)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options          "DENY"    always;
    add_header X-Content-Type-Options   "nosniff" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/x-font-ttf font/opentype image/svg+xml;

    # ── Request size limit (global) ───────────────────────────────────────────
    client_max_body_size 10m;

    # ── Timeout ───────────────────────────────────────────────────────────────
    proxy_connect_timeout  10s;
    proxy_read_timeout     120s;
    proxy_send_timeout     60s;

    set $frontend_upstream http://frontend:80;
    set $backend_upstream  http://backend:8000;

    # ── Frontend (Vue SPA) ────────────────────────────────────────────────────
    location / {
        proxy_pass         $frontend_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Login endpoint — rate limit nghiêm ngặt ───────────────────────────────
    location = /api/v1/auth/login {
        limit_req        zone=login_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_pass         $backend_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Backend API ───────────────────────────────────────────────────────────
    location /api/ {
        limit_req        zone=api_limit burst=40 nodelay;
        limit_req_status 429;

        proxy_pass         $backend_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Tắt cache cho API
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        proxy_no_cache        1;
        proxy_cache_bypass    1;
    }

    # ── File import endpoints — allow larger body ──────────────────────────────
    location ~* ^/api/v1/(employees/import|imports/) {
        client_max_body_size 20m;

        proxy_pass         $backend_upstream;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Health/metrics — internal only (tuỳ chọn) ────────────────────────────
    location /health {
        proxy_pass       $backend_upstream;
        proxy_set_header Host $host;
        access_log off;
    }
}
