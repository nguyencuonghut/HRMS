[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session

# Coverage — chạy với: pytest (auto) hoặc pytest --no-cov để tắt
addopts =
    --cov=app
    --cov-report=term-missing:skip-covered
    --cov-report=html:htmlcov
    --cov-branch
    -q

# Không yêu cầu coverage threshold tự động (quá strict khi dev nhanh)
# Để enforce threshold trong CI: pytest --cov-fail-under=75
