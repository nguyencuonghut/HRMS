services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-hrms}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE}:${IMAGE_TAG}
    restart: always
    command: >
      gunicorn app.main:app
        -w 4
        -k uvicorn.workers.UvicornWorker
        --bind 0.0.0.0:8000
        --timeout 120
        --graceful-timeout 30
        --max-requests 1000
        --max-requests-jitter 100
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-hrms}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      REFRESH_TOKEN_COOKIE_SECURE: ${REFRESH_TOKEN_COOKIE_SECURE}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-}
      MINIO_SECURE: ${MINIO_SECURE}
      BACKUP_STORAGE_ENDPOINT: ${BACKUP_STORAGE_ENDPOINT}
      BACKUP_STORAGE_ACCESS_KEY: ${BACKUP_STORAGE_ACCESS_KEY}
      BACKUP_STORAGE_SECRET_KEY: ${BACKUP_STORAGE_SECRET_KEY}
      BACKUP_STORAGE_SECURE: ${BACKUP_STORAGE_SECURE:-true}
      BACKUP_STORAGE_BUCKET: ${BACKUP_STORAGE_BUCKET:-hrms-backup}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-90}
      DB_BACKUP_CRON: ${DB_BACKUP_CRON:-0 2 * * *}
      MINIO_BACKUP_CRON: ${MINIO_BACKUP_CRON:-0 3 * * *}
      SOURCE_STORAGE_ENDPOINT: ${SOURCE_STORAGE_ENDPOINT:-${MINIO_ENDPOINT}}
      SOURCE_STORAGE_ACCESS_KEY: ${SOURCE_STORAGE_ACCESS_KEY:-${MINIO_ACCESS_KEY}}
      SOURCE_STORAGE_SECRET_KEY: ${SOURCE_STORAGE_SECRET_KEY:-${MINIO_SECRET_KEY}}
      SOURCE_STORAGE_SECURE: ${SOURCE_STORAGE_SECURE:-${MINIO_SECURE}}
      BACKUP_NOTIFY_EMAILS: ${BACKUP_NOTIFY_EMAILS:-}
      DEBUG: "false"
      ENVIRONMENT: ${ENVIRONMENT:-lan}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Ho_Chi_Minh}
      SENTRY_DSN: ${SENTRY_DSN:-}
      HEALTHCHECK_PING_URL: ${HEALTHCHECK_PING_URL:-}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      BOOTSTRAP_ADMIN_FULL_NAME: ${BOOTSTRAP_ADMIN_FULL_NAME:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  celery_worker:
    image: ${BACKEND_IMAGE}:${IMAGE_TAG}
    restart: always
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info --concurrency=4 -Q celery,exports,backups
    healthcheck:
      test: ["CMD-SHELL", 'python -c "from pathlib import Path; import sys; cmd=Path(\"/proc/1/cmdline\").read_bytes(); sys.exit(0 if b\"celery\" in cmd and b\"worker\" in cmd else 1)"']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-hrms}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-}
      MINIO_SECURE: ${MINIO_SECURE}
      BACKUP_STORAGE_ENDPOINT: ${BACKUP_STORAGE_ENDPOINT}
      BACKUP_STORAGE_ACCESS_KEY: ${BACKUP_STORAGE_ACCESS_KEY}
      BACKUP_STORAGE_SECRET_KEY: ${BACKUP_STORAGE_SECRET_KEY}
      BACKUP_STORAGE_SECURE: ${BACKUP_STORAGE_SECURE:-true}
      BACKUP_STORAGE_BUCKET: ${BACKUP_STORAGE_BUCKET:-hrms-backup}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-90}
      DB_BACKUP_CRON: ${DB_BACKUP_CRON:-0 2 * * *}
      MINIO_BACKUP_CRON: ${MINIO_BACKUP_CRON:-0 3 * * *}
      SOURCE_STORAGE_ENDPOINT: ${SOURCE_STORAGE_ENDPOINT:-${MINIO_ENDPOINT}}
      SOURCE_STORAGE_ACCESS_KEY: ${SOURCE_STORAGE_ACCESS_KEY:-${MINIO_ACCESS_KEY}}
      SOURCE_STORAGE_SECRET_KEY: ${SOURCE_STORAGE_SECRET_KEY:-${MINIO_SECRET_KEY}}
      SOURCE_STORAGE_SECURE: ${SOURCE_STORAGE_SECURE:-${MINIO_SECURE}}
      BACKUP_NOTIFY_EMAILS: ${BACKUP_NOTIFY_EMAILS:-}
      ENVIRONMENT: ${ENVIRONMENT:-lan}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Ho_Chi_Minh}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  celery_beat:
    image: ${BACKEND_IMAGE}:${IMAGE_TAG}
    restart: always
    command: celery -A app.core.celery_app.celery_app beat --loglevel=info --scheduler redbeat.RedBeatScheduler
    healthcheck:
      test: ["CMD-SHELL", 'python -c "from pathlib import Path; import sys; cmd=Path(\"/proc/1/cmdline\").read_bytes(); sys.exit(0 if b\"celery\" in cmd and b\"beat\" in cmd else 1)"']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-hrms}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-}
      MINIO_SECURE: ${MINIO_SECURE}
      ENVIRONMENT: ${ENVIRONMENT:-lan}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Ho_Chi_Minh}
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      redis:
        condition: service_healthy
      celery_worker:
        condition: service_started
      minio:
        condition: service_healthy

  frontend:
    image: ${FRONTEND_IMAGE}:${IMAGE_TAG}
    restart: always

  backup_scheduler:
    image: ${BACKUP_IMAGE}:${IMAGE_TAG}
    restart: always
    profiles: ["backup"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-hrms}
      SECRET_KEY: ${SECRET_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      REFRESH_TOKEN_COOKIE_SECURE: ${REFRESH_TOKEN_COOKIE_SECURE}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-hrms-attachments-prod}
      MINIO_SECURE: ${MINIO_SECURE}
      ENVIRONMENT: ${ENVIRONMENT:-lan}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Ho_Chi_Minh}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      SMTP_USE_STARTTLS: ${SMTP_USE_STARTTLS:-false}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
      BACKUP_NOTIFY_EMAILS: ${BACKUP_NOTIFY_EMAILS:-}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER}
      DB_NAME: ${POSTGRES_DB:-hrms}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      BACKUP_DIR: /backups/postgres
      LOG_DIR: /logs
      RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-90}
      DB_BACKUP_CRON: ${DB_BACKUP_CRON:-0 2 * * *}
      MINIO_BACKUP_CRON: ${MINIO_BACKUP_CRON:-0 3 * * *}
      SOURCE_ALIAS: ${SOURCE_ALIAS:-local}
      SOURCE_BUCKET: ${MINIO_BUCKET:-hrms-attachments-prod}
      SOURCE_STORAGE_ENDPOINT: ${SOURCE_STORAGE_ENDPOINT:-${MINIO_ENDPOINT}}
      SOURCE_STORAGE_ACCESS_KEY: ${SOURCE_STORAGE_ACCESS_KEY:-${MINIO_ACCESS_KEY}}
      SOURCE_STORAGE_SECRET_KEY: ${SOURCE_STORAGE_SECRET_KEY:-${MINIO_SECRET_KEY}}
      SOURCE_STORAGE_SECURE: ${SOURCE_STORAGE_SECURE:-${MINIO_SECURE}}
      DEST_ALIAS: ${DEST_ALIAS:-backup}
      DEST_BUCKET: ${BACKUP_STORAGE_BUCKET:-hrms-backup}
      BACKUP_STORAGE_ENDPOINT: ${BACKUP_STORAGE_ENDPOINT}
      BACKUP_STORAGE_ACCESS_KEY: ${BACKUP_STORAGE_ACCESS_KEY}
      BACKUP_STORAGE_SECRET_KEY: ${BACKUP_STORAGE_SECRET_KEY}
      BACKUP_STORAGE_SECURE: ${BACKUP_STORAGE_SECURE:-true}
    volumes:
      - backup_data:/backups/postgres
      - backup_logs:/logs
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf.d/default.lan-http.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  backup_data:
  backup_logs:
  minio_data:
  postgres_data:
